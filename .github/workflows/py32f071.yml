name: PY32F071 firmware

on:
  push:
    branches:
      - agent/py32f071-toolchain
    paths:
      - "platform/py32f071/**"
      - "include/**"
      - "src/**"
      - "lib/jsmn/**"
      - ".github/workflows/py32f071.yml"
  pull_request:
    paths:
      - "platform/py32f071/**"
      - "include/**"
      - "src/**"
      - "lib/jsmn/**"
      - ".github/workflows/py32f071.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNU Arm toolchain and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi

      - name: Record tool versions
        run: |
          set -o pipefail
          {
            arm-none-eabi-gcc --version
            arm-none-eabi-ld --version
            cmake --version
            ninja --version
          } | tee tool-versions.txt

      - name: Configure
        run: |
          set -o pipefail
          cmake \
            -S platform/py32f071 \
            -B build/py32f071 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            2>&1 | tee configure.log

      - name: Build
        run: |
          set -o pipefail
          cmake --build build/py32f071 2>&1 | tee build.log

      - name: Upload failed build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: firestarter-py32f071-build-diagnostics
          if-no-files-found: warn
          path: |
            configure.log
            build.log
            tool-versions.txt
            build/py32f071/CMakeCache.txt
            build/py32f071/build.ninja

      - name: Report size
        run: |
          set -o pipefail
          arm-none-eabi-size \
            build/py32f071/firestarter-py32f071.elf \
            | tee size.txt

      - name: Create and verify firmware checksums
        working-directory: build/py32f071
        run: |
          set -euxo pipefail
          test -s firestarter-py32f071.elf
          test -s firestarter-py32f071.bin
          test -s firestarter-py32f071.hex
          sha256sum \
            firestarter-py32f071.elf \
            firestarter-py32f071.bin \
            firestarter-py32f071.hex \
            > firestarter-py32f071.sha256
          cat firestarter-py32f071.sha256
          sha256sum --check firestarter-py32f071.sha256

      - name: Create artifact checksum manifest
        run: |
          sha256sum \
            build/py32f071/firestarter-py32f071.elf \
            build/py32f071/firestarter-py32f071.bin \
            build/py32f071/firestarter-py32f071.hex \
            build/py32f071/firestarter-py32f071.map \
            configure.log \
            build.log \
            size.txt \
            tool-versions.txt \
            > SHA256SUMS

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firestarter-py32f071
          if-no-files-found: error
          path: |
            build/py32f071/firestarter-py32f071.elf
            build/py32f071/firestarter-py32f071.bin
            build/py32f071/firestarter-py32f071.hex
            build/py32f071/firestarter-py32f071.map
            build/py32f071/firestarter-py32f071.sha256
            configure.log
            build.log
            size.txt
            tool-versions.txt
            SHA256SUMS
