name: PY32F071 firmware

on:
  pull_request:
    paths:
      - "platform/py32f071/**"
      - "include/**"
      - "src/**"
      - "lib/jsmn/**"
      - ".github/workflows/py32f071.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNU Arm toolchain and build tools
        run: |
          sudo apt-get update
