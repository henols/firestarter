name: Firestarter CI
on:
  push:
    branches:
    - main
    paths-ignore:
    - '**.md'
    - '**.sh'
    - '.gitignore'
    - 'docs/**'
    - 'documents/**'
    - 'images/**'
    - '.vscode/**'
    - '.editorconfig/**'
  pull_request:
    branches:
    - main
    paths-ignore:
    - '**.md'
    - '**.sh'
    - '.gitignore'
    - 'docs/**'
    - 'documents/**'
    - 'images/**'
    - '.vscode/**'
    - '.editorconfig/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v4

      # Phase 6 WR-05: codegen drift + catalog validity must run BEFORE the
      # version-bump auto-commit. The drift gate is read-only and runs on a
      # fresh checkout; if it fails, the version bump and the auto-commit
      # don't happen. The previous step ordering ran update_version.py +
      # git-auto-commit-action FIRST, which pushed a version-bump commit to
      # the branch (including main) BEFORE the gate had a chance to veto it.
      # On main that was particularly bad: the auto-commit landed on the
      # protected branch and the operator now had a published commit they
      # had to revert / overwrite if the gate failed.
      - name: Set up Python 3.11 for codegen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Catalog validity check
        run: python3 tools/catalog/codegen.py --catalog tools/catalog/messages.toml --check

      - name: Codegen drift gate (messages.h)
        run: |
          python3 tools/catalog/codegen.py \
            --catalog tools/catalog/messages.toml \
            --target include/messages.h \
            --language cpp
          git diff --exit-code include/messages.h

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      # Phase 6 WR-01: run the native Unity suite (host-side, no AVR board
      # required) in CI. test_messages pins the CRC8 polynomial + the exact
      # wire-frame byte sequence — a silent refactor that breaks the locked
      # frame contract from CONTEXT D-01..D-04 must fail CI, not slip
      # through because CI only built and never executed the tests.
      - name: Run native unit tests
        run: pio test -e native

      # --- Version bump + tag commit now gated by everything above ---
      - name: Generate release version
        id: version
        run: .github/scripts/update_version.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        # with:
        #   tagging_message: ${{ steps.version.outputs.version }}
        # env:
        #   GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Build PlatformIO Project
        run: pio run

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: .pio/build/**/firestarter_*.hex
          tag_name: ${{ steps.version.outputs.version }}
          make_latest: true
          # token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
