; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
monitor_speed = 250000

build_flags = 
	-D MONITOR_SPEED=${env.monitor_speed}
	-D HARDWARE_REVISION
	; -D SERIAL_DEBUG 
	; -D DEBUG_ADDRESS
	-D DEV_TOOLS
	; -D EXTRA_INFO_LOGGING
	
extra_scripts = pre:name_firmware.py

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_flags = 
	${env.build_flags}
	-D RURP_BOARD_NAME=\"${this.board}\"
	-D SERIAL_ON_IO

[env:leonardo]
platform = atmelavr
board = leonardo
framework = arduino
build_flags =
	${env.build_flags}
	-D RURP_BOARD_NAME=\"${this.board}\"
	-D DATA_BUFFER_SIZE=1024

[env:native]
platform = native
test_framework = unity
build_flags =
	${env.build_flags}
	-std=gnu++17
	-I include
	-I test/native/avr/test_dispatch
lib_deps =
	fabiobatsilva/ArduinoFake@^0.4.0
; test_build_src = no keeps AVR-only sources (rurp_shield.cpp, logging.cpp)
; out of the host compile. The dispatch test file links against firmware
; symbols it needs directly; Plan 02 will add host stubs/mocks for
; configure_memory's hardware-side dependencies (rurp_log, rurp_*).
test_build_src = no
