; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Phase 20 E2E-04: `pio run` (the firmware build) MUST NOT attempt to link the
; [env:native] target — it is a test-only environment with no main(), so
; linking fails with "undefined reference to main". Constrain default_envs
; to the AVR targets; `pio test -e native` still picks up native explicitly.
default_envs = uno, uno328pb, leonardo

[env]
monitor_speed = 250000

build_flags = 
	-D MONITOR_SPEED=${env.monitor_speed}
	-D HARDWARE_REVISION
	; -D SERIAL_DEBUG 
	; -D DEBUG_ADDRESS
	-D DEV_TOOLS
	; -D EXTRA_INFO_LOGGING
	
extra_scripts = pre:name_firmware.py

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_flags =
	${env.build_flags}
	-D RURP_BOARD_NAME=\"${this.board}\"
	-D SERIAL_ON_IO

[env:uno328pb]
; Phase 21 / Plan 21-02: third firmware target — Arduino-Uno-shaped board
; carrying an ATmega328PB MCU. platform = atmelavr (mirror of [env:uno]);
; the bundled boards/ATmega328PB.json ships with build.core = "MiniCore"
; and -DARDUINO_AVR_ATmega328PB via build.extra_flags, so the four widened
; ARDUINO_AVR_UNO guards (uno_rurp_shield.cpp:8, rurp_common.cpp:10+23,
; rurp_register_utils.h:63) now fire on this env. RURP_BOARD_NAME is the
; literal "uno328pb" (NOT \"${this.board}\" — which would resolve to
; ATmega328PB and break the board-id triple per CONTEXT D-07).
platform = atmelavr
board = ATmega328PB
framework = arduino
build_flags =
	${env.build_flags}
	-D RURP_BOARD_NAME=\"uno328pb\"
	-D SERIAL_ON_IO

[env:leonardo]
platform = atmelavr
board = leonardo
framework = arduino
build_flags =
	${env.build_flags}
	-D RURP_BOARD_NAME=\"${this.board}\"
	; TEMP: 512 to match Uno for buffer-size A/B test (was 1024)
	-D DATA_BUFFER_SIZE=512

[env:native]
platform = native
test_framework = unity
; KNOWN-FLAKY: test_flash_intel_vpp + test_eeprom28c_chip_id suites have all
; individual Unity assertions PASS but the suite as a whole ERRORS (Unity
; teardown abort, pre-existing parallel-build filesystem race).
; Documented in Phase 17 code review WR-01 + Phase 20 verification (2026-05-20).
; Tracked as carry-forward debt in v1.4 MILESTONES.md "Known Gaps".
; TODO(v1.5): root-cause the SIGABRT in Unity teardown and re-enable.
; Using positive test_filter allowlist (test_ignore was being honored
; inconsistently — likely PIO version quirk).
test_filter =
	native/avr/test_dispatch
	native/avr/test_messages
	native/avr/test_data_input
	native/avr/test_read_timing
build_flags =
	${env.build_flags}
	-std=gnu++17
	-I include
	-I test/native/avr/test_dispatch
	-I test/native/avr/test_messages
	-I test/native/avr/test_data_input
	-I test/native/avr/test_read_timing
	-D RURP_BOARD_NAME=\"native\"
lib_deps =
	fabiobatsilva/ArduinoFake@^0.4.0
; Phase 12 Wave 1: pull in ONLY src/proms/*.cpp from the firmware tree so
; configure_memory() and the configure_*() handlers link into the host
; test binary. AVR-only sources (src/boards/*.cpp, src/dev_tools.cpp,
; src/eprom_operations.cpp, src/logging.c) are excluded; their rurp_log
; / rurp_* / PROGMEM-string symbols are stubbed by
; test/native/avr/test_dispatch/host_stubs.cpp (auto-discovered by PIO
; under test/).
; Phase 6: include rurp_serial_utils.cpp for test_messages suite.
; (messages.c was generated as a 256-byte PROGMEM param-byte-count table
; but had no firmware callers; deleted post-Phase-7 to reclaim ~256 B of
; Leonardo flash. The test suite no longer needs to include it.)
; Phase 44 Plan 02: include json_parser.c for test_read_timing suite
; (json_parse / json_init are called directly by the read-timing knob tests).
build_src_filter = +<proms/> +<boards/rurp_serial_utils.cpp> +<json_parser.c>
test_build_src = yes
