; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
monitor_speed = 250000

build_flags = 
	-D MONITOR_SPEED=${env.monitor_speed}
	-D HARDWARE_REVISION
	; -D SERIAL_DEBUG 
	; -D DEBUG_ADDRESS
	-D DEV_TOOLS
	; -D EXTRA_INFO_LOGGING
	
extra_scripts = pre:name_firmware.py

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_flags =
	${env.build_flags}
	-D RURP_BOARD_NAME=\"${this.board}\"
	-D SERIAL_ON_IO

[env:leonardo]
platform = atmelavr
board = leonardo
framework = arduino
build_flags =
	${env.build_flags}
	-D RURP_BOARD_NAME=\"${this.board}\"
	-D DATA_BUFFER_SIZE=1024

[env:native]
platform = native
test_framework = unity
build_flags =
	${env.build_flags}
	-std=gnu++17
	-I include
	-I test/native/avr/test_dispatch
	-D RURP_BOARD_NAME=\"native\"
lib_deps =
	fabiobatsilva/ArduinoFake@^0.4.0
; Phase 12 Wave 1: pull in ONLY src/proms/*.cpp from the firmware tree so
; configure_memory() and the configure_*() handlers link into the host
; test binary. AVR-only sources (src/boards/*.cpp, src/dev_tools.cpp,
; src/eprom_operations.cpp, src/logging.c) are excluded; their rurp_log
; / rurp_* / PROGMEM-string symbols are stubbed by
; test/native/avr/test_dispatch/host_stubs.cpp (auto-discovered by PIO
; under test/).
src_filter = +<proms/>
test_build_src = yes
