# Firestarter v1.2 log-message catalog (canonical source — meta-repo authoritative)
#
# DO NOT REORDER ENTRIES. Codegen sorts by id ascending; the source file order
# is preserved for human-edit diff readability.
#
# Distribution: copied byte-identically into firestarter/tools/catalog/ and
# firestarter_app/tools/catalog/ by .planning/catalog/sync_to_subrepos.sh.
# Edit ONLY this meta-repo copy; run the sync script after every edit.
#
# Schema reference: .planning/phases/06-logging-infrastructure/06-RESEARCH.md
# §"Catalog Format + Schema" and §"Param Shape + Render Hints".

[catalog]
version = 1
project = "firestarter"

# ---------------------------------------------------------------------------
# 0x00 reserved sentinel
# ---------------------------------------------------------------------------

[[messages]]
id          = 0x00
name        = "MSG_NONE"
severity    = "OK"
format      = "(reserved sentinel)"
params      = []
wire_format = "id_frame"

# ---------------------------------------------------------------------------
# OK (0x01..0x0F)
# ---------------------------------------------------------------------------

[[messages]]
id          = 0x01
name        = "MSG_OK_READY"
severity    = "OK"
format      = "Ready"
params      = []
wire_format = "id_frame"

[[messages]]
id          = 0x02
name        = "MSG_OK_REQ_DATA"
severity    = "OK"
format      = "Req data"
params      = []
wire_format = "id_frame"

# Special: FW-version handshake stays text-format so the host can read the
# firmware version BEFORE loading the catalog (LFW-05). params MUST be [].
[[messages]]
id          = 0x03
name        = "MSG_OK_FW_VERSION"
severity    = "OK"
format      = "FW_VERSION"
params      = []
wire_format = "text"

[[messages]]
id          = 0x04
name        = "MSG_OK_REV"
severity    = "OK"
format      = "Rev%d%s"
params      = [
    { type = "u8" },
    { type = "ascii_str" },
]
wire_format = "id_frame"

[[messages]]
id          = 0x05
name        = "MSG_OK_CFG"
severity    = "OK"
format      = "R1: %ld, R2: %ld%s"
params      = [
    { type = "i32" },
    { type = "i32" },
    { type = "ascii_str" },
]
wire_format = "id_frame"

# Special: FW handshake response (carries fw, hw, cmd in one text frame).
# Locked text-format per LFW-05; params MUST be [].
[[messages]]
id          = 0x06
name        = "MSG_OK_FW_HANDSHAKE"
severity    = "OK"
format      = "FW: %s, HW: Rev%d, Cmd: 0x%02x"
params      = []
wire_format = "text"

# ---------------------------------------------------------------------------
# INIT (0x10..0x1F)
# ---------------------------------------------------------------------------

[[messages]]
id          = 0x10
name        = "MSG_INIT_DONE"
severity    = "INIT"
format      = "(init done)"
params      = []
wire_format = "id_frame"

# ---------------------------------------------------------------------------
# MAIN (0x20..0x2F)
# ---------------------------------------------------------------------------

[[messages]]
id          = 0x20
name        = "MSG_MAIN_DONE"
severity    = "MAIN"
format      = "(main done)"
params      = []
wire_format = "id_frame"

# ---------------------------------------------------------------------------
# END (0x30..0x3F)
# ---------------------------------------------------------------------------

[[messages]]
id          = 0x30
name        = "MSG_END_DONE"
severity    = "END"
format      = "(end done)"
params      = []
wire_format = "id_frame"

# ---------------------------------------------------------------------------
