# Firestarter v1.2 log-message catalog (canonical source — meta-repo authoritative)
#
# DO NOT REORDER ENTRIES. Codegen sorts by id ascending; the source file order
# is preserved for human-edit diff readability.
#
# Distribution: copied byte-identically into firestarter/tools/catalog/ and
# firestarter_app/tools/catalog/ by tools/catalog/sync_to_subrepos.sh.
# Edit ONLY this meta-repo copy; run the sync script after every edit.
#
# Schema reference: .planning/phases/06-logging-infrastructure/06-RESEARCH.md
# §"Catalog Format + Schema" and §"Param Shape + Render Hints".

[catalog]
version = 1
project = "firestarter"

# ---------------------------------------------------------------------------
# 0x00 reserved sentinel
# ---------------------------------------------------------------------------

[[messages]]
id          = 0x00
name        = "MSG_NONE"
severity    = "OK"
format      = "(reserved sentinel)"
params      = []
wire_format = "id_frame"

# ---------------------------------------------------------------------------
# OK (0x01..0x0F)
# ---------------------------------------------------------------------------

[[messages]]
id          = 0x01
name        = "MSG_OK_READY"
severity    = "OK"
format      = "Ready"
params      = []
wire_format = "id_frame"

[[messages]]
id          = 0x02
name        = "MSG_OK_REQ_DATA"
severity    = "OK"
format      = "Request data"
params      = []
wire_format = "id_frame"

# Special: FW-version handshake stays text-format so the host can read the
# firmware version BEFORE loading the catalog (LFW-05). params MUST be [].
# The firmware sends a plain text line; the host bootstrap path parses it.
# ascii_str shape is documented here but wire_format=text means the validator
# enforces params=[] (Rule 8). See P-01 in 08-CONTEXT.md.
[[messages]]
id          = 0x03
name        = "MSG_OK_FW_VERSION"
severity    = "OK"
format      = "FW: {0}"
params      = []
wire_format = "text"

# P-02: Fixed-shape u8 physical + u8 effective. effective=0xFF means no override.
# Host renders "Rev{physical}" or "Rev{effective}, Override HW: Rev{physical}".
[[messages]]
id          = 0x04
name        = "MSG_OK_REV"
severity    = "OK"
format      = "Rev%u (eff: %u)"
params      = [
    { type = "u8" },
    { type = "u8" },
]
wire_format = "id_frame"

# P-03: Fixed-shape u32 r1 + u32 r2 + u8 override. override=0xFF means no override.
# 9 wire bytes fixed. Host renders override branch host-side.
[[messages]]
id          = 0x05
name        = "MSG_OK_CFG"
severity    = "OK"
format      = "R1: %lu, R2: %lu, Cfg: %u"
params      = [
    { type = "u32" },
    { type = "u32" },
    { type = "u8" },
]
wire_format = "id_frame"

# P-04: Composite id_frame: u8 hw + u8 cmd + ascii_str fw_version.
# hw=0xFF sentinel means no HARDWARE_REVISION defined. Fixed-shape params first.
[[messages]]
id          = 0x06
name        = "MSG_OK_FW_HANDSHAKE"
severity    = "OK"
format      = "HW: %u, Cmd: 0x%02x, FW: %s"
params      = [
    { type = "u8" },
    { type = "u8" },
    { type = "ascii_str" },
]
wire_format = "id_frame"

# ---------------------------------------------------------------------------
# INIT (0x10..0x1F)
# ---------------------------------------------------------------------------

[[messages]]
id          = 0x10
name        = "MSG_INIT_DONE"
severity    = "INIT"
format      = "(init done)"
params      = []
wire_format = "id_frame"

# ---------------------------------------------------------------------------
