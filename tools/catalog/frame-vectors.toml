# Firestarter v1.10 frame-vector catalog (canonical source — firmware sub-repo copy)
#
# DO NOT EDIT without making the same change in the host sub-repo copy at
# firestarter_app/tools/catalog/frame-vectors.toml.
# These two files must remain byte-identical; drift is detected by per-repo
# CI drift gates + paired-commit discipline (D-09, Phase 52).
#
# Frame byte layout for all vectors: COBS(payload + CRC8(payload)) + 0x00
# No '#' prefix in the stored vector bytes (the '#' is consumed by the caller
# before rurp_communication_read_data() is entered; vectors are defined at the
# COBS layer — see 52-RESEARCH.md Pitfall 2).
#
# Golden-vector corpus (D-05): mandated cases + COBS-boundary stress
# (253/254/255-run) + edge payloads (empty, single-0x00) + data blocks at
# 512 B and 1024 B (all-0xFF and all-0x00). Byte values are hardcoded literals,
# NEVER computed at codegen time (frozen contract — D-01).

